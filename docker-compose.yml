# Spin up commands based on STORAGE_ADAPTER in src/config/identifiers.ts:
#   postgres (default): docker compose up
#   clickhouse:         docker compose --profile clickhouse up
services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scrawn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    profiles:
      - clickhouse
    image: clickhouse/clickhouse-server:latest
    restart: always
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DB: scrawn
    volumes:
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: scrawndotdev/scrawn:latest
    restart: unless-stopped
    ports:
      - "8070:8070"
      - "8069:8069"
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/scrawn
      CLICKHOUSE_URL: http://default:clickhouse@clickhouse:8123/scrawn
      NODE_ENV: production
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  pgdata:
  chdata:
